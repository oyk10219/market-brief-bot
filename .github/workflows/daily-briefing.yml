name: Daily Market Briefing

on:
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DART_TARGET_COMPANIES: ${{ secrets.DART_TARGET_COMPANIES }}
        run: |
          missing=0
          for name in NAVER_CLIENT_ID NAVER_CLIENT_SECRET TELEGRAM_BOT_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is required"
              missing=1
            fi
          done
          if [ -z "$TELEGRAM_CHAT_ID" ] && [ -z "$TELEGRAM_CHAT_IDS" ]; then
            echo "::error title=Missing secret::TELEGRAM_CHAT_ID or TELEGRAM_CHAT_IDS is required"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          python -m src.main --save-md
